name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    name: Code Quality & Testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for tj-actions/changed-files to determine file changes accurately

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip' # Leverages GitHub caching mechanism for faster subsequent runs

      - name: Upgrade Pip & Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-ci.txt ]; then
            pip install -r requirements-ci.txt
          else
            echo "requirements-ci.txt not found. Installing inline fallbacks."
            pip install ruff bandit pytest pytest-asyncio httpx fastapi pydantic uvicorn
          fi

      - name: Get Changed Python Files
        id: changed-files
        uses: tj-actions/changed-files@v45
        with:
          files: |
             **/*.py

      - name: Run Ruff Linter
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          ruff check "${{ steps.changed-files.outputs.all_changed_files }}"

      - name: Run Bandit Security Scanner
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          bandit -v "${{ steps.changed-files.outputs.all_changed_files }}"

      - name: Run Pytest
        run: |
          if [ -d "tests" ]; then
            python -m pytest -v
          else
            echo "No tests/ directory found. Skipping unit tests."
          fi