name: CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history so git diff can detect changes properly

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip" # Automatically handles caching based on requirements.txt if it exists

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            echo "requirements.txt found. Installing dependencies..."
            pip install -r requirements.txt
          else
            echo "requirements.txt missing. Installing default packages..."
            pip install fastapi uvicorn pydantic bandit ruff pytest
          fi

      - name: Get changed Python files
        id: changed-files
        uses: tj-actions/changed-files@v45
        with:
          files: |
            **/*.py

      - name: Evaluate changes and run Linters/Security Scans
        run: |
          if [ "${{ steps.changed-files.outputs.any_changed }}" != "true" ]; then
            echo "No Python files changed."
            echo "Skipping Ruff and Bandit."
          else
            echo "Python files changed. Running checks..."
            
            echo "=== Running Ruff ==="
            ruff check ${{ steps.changed-files.outputs.all_changed_files }}
            
            echo "=== Running Bandit ==="
            # Bandit requires the files to be passed explicitly or via a list
            bandit ${{ steps.changed-files.outputs.all_changed_files }}
          fi

      - name: Run Tests with pytest
        run: |
          if [ -d tests ]; then
            python -m pytest
          else
            echo "No tests directory found. Skipping pytest."
          fi